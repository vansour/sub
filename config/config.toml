[server]
host = "0.0.0.0"
port = 8080

[http_client]
# URL 抓取配置
# 每个 URL 最大重试次数
max_retries = 2
# 最大并发请求数
max_concurrent = 10
# 总超时时间（秒）
total_timeout_secs = 30
# 重试退避初始延迟（毫秒）
backoff_base_ms = 200
# HTTP 客户端超时配置
# 单个请求超时（秒）
request_timeout_secs = 30
# 连接超时（秒）
connect_timeout_secs = 10
# 连接池空闲超时（秒）
pool_idle_timeout_secs = 90
# 每个主机最大空闲连接数
pool_max_idle_per_host = 10

[rate_limit]
# 登录尝试限制：每个 IP 每分钟最多尝试次数
login_attempts_per_minute = 5
# 登录失败后的锁定时长（秒）
login_lockout_duration_secs = 300
# API 请求限制：每个 IP 每秒最多请求次数
api_requests_per_second = 10
# 全局 API 请求限制：每秒最多请求次数
global_requests_per_second = 100

[security]
# 是否允许 URL 指向私有 IP（如 192.168.x.x, 10.x.x.x）
# 设为 false 可防止 SSRF 攻击
allow_private_ips = false
# 是否允许 URL 指向 localhost
# 设为 false 可防止访问本地服务
allow_localhost = false
