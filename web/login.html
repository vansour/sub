<!DOCTYPE html>
<html lang="zh-cn">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>登录 - 多链接管理服务</title>
		<link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
			}

			.login-container {
				background: white;
				border-radius: 12px;
				box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
				width: 100%;
				max-width: 400px;
				padding: 40px;
			}

			.login-header {
				text-align: center;
				margin-bottom: 32px;
			}

			.login-header h1 {
				color: #111827;
				font-size: 24px;
				margin-bottom: 8px;
			}

			.login-header p {
				color: #6b7280;
				font-size: 14px;
			}

			.form-group {
				margin-bottom: 20px;
			}

			label {
				display: block;
				margin-bottom: 8px;
				font-weight: 500;
				color: #374151;
				font-size: 14px;
			}

			input[type="text"],
			input[type="password"] {
				width: 100%;
				padding: 12px 16px;
				border: 1px solid #d1d5db;
				border-radius: 8px;
				font-size: 14px;
				transition: all 0.2s;
			}

			input[type="text"]:focus,
			input[type="password"]:focus {
				outline: none;
				border-color: #3b82f6;
				box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
			}

			.btn-login {
				width: 100%;
				padding: 12px 16px;
				background: #3b82f6;
				color: white;
				border: none;
				border-radius: 8px;
				font-size: 16px;
				font-weight: 600;
				cursor: pointer;
				transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
			}

			.btn-login:hover {
				background: #2563eb;
				box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
				transform: translateY(-1px);
			}

			.btn-login:active {
				transform: translateY(0);
				box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
			}

			.btn-login:disabled {
				opacity: 0.6;
				cursor: not-allowed;
				transform: none;
				box-shadow: none;
			}

			.error-message {
				background: #fee2e2;
				color: #991b1b;
				padding: 12px 16px;
				border-radius: 8px;
				font-size: 14px;
				margin-bottom: 20px;
				border: 1px solid #fecaca;
				display: none;
			}

			.error-message.show {
				display: block;
			}

			.loading {
				display: inline-block;
				width: 16px;
				height: 16px;
				border: 2px solid #ffffff;
				border-top: 2px solid transparent;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin-right: 8px;
				vertical-align: middle;
			}

			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}

			.footer {
				text-align: center;
				margin-top: 24px;
				color: #6b7280;
				font-size: 12px;
			}

			.footer span {
				color: #4b5563;
				font-weight: 500;
			}
		</style>
	</head>
	<body>
		<div class="login-container">
			<div class="login-header">
				<h1>🔗 多链接管理服务</h1>
				<p>请登录以继续</p>
			</div>

			<div id="errorMessage" class="error-message"></div>

			<form id="loginForm">
				<div class="form-group">
					<label for="username">用户名</label>
					<input
						type="text"
						id="username"
						name="username"
						placeholder="请输入用户名"
						autocomplete="username"
						required
					/>
				</div>

				<div class="form-group">
					<label for="password">密码</label>
					<input
						type="password"
						id="password"
						name="password"
						placeholder="请输入密码"
						autocomplete="current-password"
						required
					/>
				</div>

				<button type="submit" class="btn-login" id="loginBtn">
					登录
				</button>
			</form>

			<div class="footer">
				<p>sub 短链接管理系统</p>
			</div>
		</div>

		<script>
			// 错误消息国际化
			const LOGIN_ERROR_MESSAGES = {
				401: '用户名或密码错误',
				403: '账号已被锁定',
				429: '登录尝试过于频繁，请稍后再试',
				500: '服务器错误，请稍后重试',
				502: '网关错误',
				503: '服务暂时不可用',
				'network_error': '网络连接失败，请检查网络',
				'default': '登录失败，请稍后重试'
			};

			function getLoginErrorMessage(error) {
				if (typeof error === 'number') {
					return LOGIN_ERROR_MESSAGES[error] || `登录失败 (${error})`;
				}
				if (error instanceof Error) {
					if (error.message === 'Failed to fetch' || error.message.includes('NetworkError')) {
						return LOGIN_ERROR_MESSAGES['network_error'];
					}
					return error.message;
				}
				return error || LOGIN_ERROR_MESSAGES['default'];
			}

			const loginForm = document.getElementById('loginForm');
			const loginBtn = document.getElementById('loginBtn');
			const errorMessage = document.getElementById('errorMessage');

			loginForm.addEventListener('submit', async (e) => {
				e.preventDefault();

				const username = document.getElementById('username').value;
				const password = document.getElementById('password').value;

				// 隐藏错误信息
				errorMessage.classList.remove('show');
				errorMessage.textContent = '';

				// 显示加载状态
				loginBtn.disabled = true;
				loginBtn.innerHTML = '<span class="loading"></span>登录中...';

				try {
					const response = await fetch('/api/login', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({ username, password }),
					});

					const data = await response.json();

					if (response.ok) {
						// 保存 token (后端返回格式为 {success: true, data: {token: "..."}})
						const token = data.data?.token || data.token;
						if (token) {
							localStorage.setItem('auth_token', token);
							// 跳转到主页
							window.location.href = '/';
						} else {
							errorMessage.textContent = '登录响应格式错误';
							errorMessage.classList.add('show');
						}
					} else {
						// 显示错误信息
						const errorMsg = data.error || data.message;
						errorMessage.textContent = getLoginErrorMessage(errorMsg || response.status);
						errorMessage.classList.add('show');
					}
				} catch (error) {
					console.error('登录错误:', error);
					errorMessage.textContent = getLoginErrorMessage(error);
					errorMessage.classList.add('show');
				} finally {
					// 恢复按钮状态
					loginBtn.disabled = false;
					loginBtn.textContent = '登录';
				}
			});

			// 如果已经登录，直接跳转
			if (localStorage.getItem('auth_token')) {
				window.location.href = '/';
			}
		</script>
	</body>
</html>
