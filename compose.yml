services:
  web:
    image: ghcr.io/vansour/sub:latest
    container_name: sub
    hostname: localhost
    build:
      context: .
      dockerfile: Dockerfile.debian
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-strong-random-secret-in-production}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
